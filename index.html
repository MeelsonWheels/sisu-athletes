body {
  margin: 0;

  background: #081421;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  align-items: center;
}

.logo {
  color: #C6FF00;
  font-weight: bold;
  font-size: 20px;
}

.button {
  background: #C6FF00;
  color: black;
  padding: 10px 18px;
  border-radius: 20px;
  text-decoration: none;
  font-weight: bold;
}

.hero {
  text-align: center;
  margin-top: 40px;
}

.hero h1 {
  font-size: 50px;
  margin-bottom: 10px;
}

.hero p {
  color: #aaa;
  max-width: 600px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
  padding: 40px;
}

.card {
  perspective: 1000px;
}

.inner {
  position: relative;
  width: 100%;
  height: 470px;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.card.flip .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #0f1f33;
  border-radius: 20px;
  overflow: hidden;
  backface-visibility: hidden;
  box-sizing: border-box;
}

.front img {
  width: 100%;
  height: 250px;
  object-fit: contain;
  background: #0b1726;
  display: block;
}

.info {
  padding: 18px 22px 20px;
}

.info h3 {
  margin: 0 0 12px 0;
  font-size: 26px;
  line-height: 1.1;
}

.info p {
  margin: 0 0 10px 0;
  color: #d7dce3;
  font-size: 16px;
  line-height: 1.4;
}

.followers {
  margin-top: 12px;
  color: #C6FF00 !important;
  font-weight: bold;
}

.back {
  transform: rotateY(180deg);
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.back h3 {
  margin-top: 0;
}

.back p {
  color: #d7dce3;
  line-height: 1.5;
}

.back a {
  background: #C6FF00;
  color: black;
  padding: 10px;
  border-radius: 12px;
  text-align: center;
  text-decoration: none;
  font-weight: bold;
}
</style>
