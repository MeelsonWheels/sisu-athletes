<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sisu Athletes</title>

<style>
body { margin: 0; font-family: Arial; background:#081421; color:white; }

header {
  display:flex; justify-content:space-between;
  padding:20px 40px; align-items:center;
}

.logo { color:#C6FF00; font-weight:bold; font-size:20px; }

.button {
  background:#C6FF00; color:black;
  padding:10px 18px; border-radius:20px;
  text-decoration:none; font-weight:bold;
}

.hero { text-align:center; margin-top:40px; }

.hero h1 { font-size:50px; margin-bottom:10px; }

.hero p { color:#aaa; max-width:600px; margin:auto; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px; padding:40px;
}

.card { perspective:1000px; }

.inner {
  position:relative;
  width:100%; height:470px;
  transition:transform .6s;
  transform-style:preserve-3d;
}

.card.flip .inner { transform:rotateY(180deg); }

.front,.back {
  position:absolute;
  width:100%; height:100%;
  background:#0f1f33;
  border-radius:20px;
  overflow:hidden;
  backface-visibility:hidden;
}

.front img {
  width:100%; height:250px;
  object-fit:contain;
  background:#0b1726;
}

.info { padding:18px 22px 20px; }

.info h3 { margin:0 0 12px; font-size:24px; }

.info p { margin:0 0 8px; color:#d7dce3; }

.followers {
  margin-top:10px;
  color:#C6FF00;
  font-weight:bold;
}

.back {
  transform:rotateY(180deg);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.back p { color:#d7dce3; line-height:1.4; }

.ig-link {
  color:#C6FF00;
  text-decoration:none;
  font-weight:bold;
}

.cta {
  background:#C6FF00;
  color:black;
  padding:10px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

const grid = document.getElementById("grid");

players.forEach(p => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="inner">
      <div class="front">
        <img src="${p.img}">
        <div class="info">
          <h3>${p.name}</h3>
          <p>${p.club}</p>
          <p>${p.nationality}</p>

      <div class="back">
        <div>

          <a class="ig-link" href="${p.igUrl}" target="_blank">${p.ig}</a>

        <a class="cta" href="mailto:info@sisusportsmanagement.com">

        </a>
      </div>
    </div>
  `;

  card.addEventListener("click", () => {
    card.classList.toggle("flip");
  });

  grid.appendChild(card);
});
</script>

</body>
</html>
