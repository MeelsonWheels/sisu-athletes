<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sisu Athletes</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #081421;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  align-items: center;
}

.logo {
  color: #C6FF00;
  font-weight: bold;
  font-size: 20px;
}

.button {
  background: #C6FF00;
  color: black;
  padding: 10px 18px;
  border-radius: 20px;
  text-decoration: none;
  font-weight: bold;
}

.hero {
  text-align: center;
  margin-top: 40px;
}

.hero h1 {
  font-size: 50px;
  margin-bottom: 10px;
}

.hero p {
  color: #aaa;
  max-width: 600px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
  padding: 40px;
}

.card {
  perspective: 1000px;
}

.inner {
  position: relative;
  width: 100%;
  height: 470px;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.card.flip .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #0f1f33;
  border-radius: 20px;
  overflow: hidden;
  backface-visibility: hidden;
}

.front img {
  width: 100%;
  height: 250px;
  object-fit: contain;
  background: #0b1726;
}

.info {
  padding: 18px 22px 20px;
}

.info h3 {
  margin: 0 0 12px 0;
  font-size: 24px;
}

.info p {
  margin: 0 0 8px 0;
  color: #d7dce3;
}

.followers {
  margin-top: 10px;
  color: #C6FF00;
  font-weight: bold;
}

.back {
  transform: rotateY(180deg);
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.back p {
  color: #d7dce3;
  line-height: 1.4;
}

.back a {
  background: #C6FF00;
  color: black;
  padding: 10px;
  border-radius: 12px;
  text-align: center;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <div class="logo">SISU</div>
  <a class="button" href="mailto:info@sisusportsmanagement.com?subject=Request%20Deck">
    Request Deck
  </a>
</header>

<div class="hero">
  <h1>SISU ATHLETES</h1>
  <p>Discover athletes for brand partnerships, global campaigns, and collaborations.</p>
</div>

<div class="grid" id="grid"></div>

<script>
const players = [

{ name:"Sabitra Bhandari", club:"Wellington Phoenix", nationality:"Nepal", followers:"103K", img:"sabitra-bhandari.jpg", bio:"Nepal’s all-time top scorer and South Asia’s highest-scoring female player.", ig:"@sambabhandari" },

{ name:"Kate Taylor", club:"Dijon · France", nationality:"New Zealand", followers:"2.9K", img:"Kate-Taylor.jpeg", bio:"Driven and ambitious, always striving to grow on and off the pitch.", ig:"@Kate._taylor" },

{ name:"Brooke Nunn", club:"Wellington Phoenix", nationality:"English", followers:"47K", img:"Brooke-Nunn.jpeg", bio:"Calm personality with strong individuality.", ig:"@Brooke_nunn" },

{ name:"Rhys Williams", club:"Brisbane Roar · Australia", nationality:"Australian / Welsh", followers:"26.4K", img:"Rhys-Williams.jpeg", bio:"Hardworking and driven with strong discipline.", ig:"@rhyswilliqms" },

{ name:"Junior Makunike", club:"Hardrock FC · Zimbabwe", nationality:"Zimbabwean", followers:"6.7K", img:"Junior-Makunike.jpeg", bio:"Energetic and motivated with a strong mindset.", ig:"@juju_makunike_18" },

{ name:"Isabel Hodgson", club:"Adelaide United · Australia", nationality:"Australian", followers:"2.9K", img:"Isabel-Hodgson.jpeg", bio:"Leader and captain with strong values and work ethic.", ig:"@isabel_hodgson" },

{ name:"Kiara Bercelli", club:"Box Hill · Australia", nationality:"New Zealand / Italy", followers:"2.7K", img:"Kiara-Bercelli.jpg", bio:"Easygoing and passionate with a love for football, gym, and fashion.", ig:"@kiarabercelli" },

{ name:"Ischia Brooking", club:"Free Agent", nationality:"Australia", followers:"1.8K", img:"Ischia-Brooking.jpeg", bio:"Down-to-earth and family-oriented.", ig:"@brookingischia" },

{ name:"Tiana Fuller", club:"Central Coast Mariners · Australia", nationality:"Australian", followers:"1.7K", img:"Tiana-Fuller.jpeg", bio:"Self-motivated and determined with strong resilience.", ig:"@Tianafuller287" },

{ name:"Jordan Lauton", club:"Brisbane Roar · Australia", nationality:"Australian", followers:"1.5K", img:"Jordan-Lauton.jpeg", bio:"Competitive and outdoors-driven footballer who values discipline, resilience, and consistency.", ig:"@Jordan_lauton" },

];

const grid = document.getElementById("grid");

players.forEach(p => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="inner">
      <div class="front">
        <img src="${p.img}">
        <div class="info">
          <h3>${p.name}</h3>
          <p>${p.club}</p>
          <p>${p.nationality}</p>
          <p class="followers">Instagram · ${p.followers}</p>
        </div>
      </div>

      <div class="back">
        <div>
          <h3>${p.name}</h3>
          <p>${p.bio}</p>
          <p>${p.ig}</p>
        </div>

        <a href="mailto:info@sisusportsmanagement.com?subject=Request%20Profile&body=Hi,%20I%20am%20interested%20in%20${encodeURIComponent(p.name)}%20full%20profile.">
          Request Full Profile
        </a>
      </div>
    </div>
  `;

  card.addEventListener("click", () => {
    card.classList.toggle("flip");
  });

  grid.appendChild(card);
});
</script>

</body>
</html>
